<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Landing-Page</title>
    <link rel="stylesheet" href="assets/css/style.css" />
    <script
      src="https://kit.fontawesome.com/efabe25798.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <header class="padding-responsive">
      <h1>FIRMAN</h1>

      <nav class="header-nav">
        <a href="" class="active">
          Home
          <i class="fa-solid fa-angle-right"></i>
        </a>

        <a href="">
          About Us
          <i class="fa-solid fa-angle-right"></i>
        </a>
        <a href="">
          Services
          <i class="fa-solid fa-angle-right"></i>
        </a>
        <a href="">
          Blog
          <i class="fa-solid fa-angle-right"></i>
        </a>
        <a href="">
          Contact
          <i class="fa-solid fa-angle-right"></i>
        </a>
      </nav>

      <div class="circle icon">
        <span class="line top"></span>
        <span class="line middle"></span>
        <span class="line bottom"></span>
      </div>
    </header>

    <main class="padding-responsive">
      <section id="home">
        <div class="home-container">
          <div class="home-content">
            <h1>Hi, I'm <span>FIRMAN</span></h1>
            <p>
              A passionate <strong>[Your Profession]</strong> with experience in
              [Skills or Industry]. I love creating solutions that bring ideas
              to life.
            </p>
            <a href="#projects" class="btn btn-primary">View My Work</a>
            <a href="#contact" class="btn btn-secondary">Get In Touch</a>
          </div>

          <div class="home-img">
            <img
              src="assets/img/home.jpg"
              alt="assets/img/home.jpg"
              loading="lazy"
            />
          </div>
        </div>

        <div class="home-cards">
          <div class="card"></div>
          <div class="card"></div>
          <div class="card"></div>
          <div class="card"></div>
        </div>
      </section>
    </main>

    <footer class="padding-responsive">
      <div class="social-media">
        <a href="">
          <i class="fa-brands fa-github"></i>
        </a>
        <a href="">
          <i class="fa-brands fa-facebook-f"></i>
        </a>
        <a href="">
          <i class="fa-brands fa-instagram"></i>
        </a>
        <a href="">
          <i class="fa-brands fa-whatsapp"></i>
        </a>
        <a href="">
          <i class="fa-brands fa-youtube"></i>
        </a>
        <a href="">
          <i class="fa-brands fa-x-twitter"></i>
        </a>
      </div>

      <nav class="footer-nav">
        <a href="" class="active"> Home </a>
        <a href=""> About Us </a>
        <a href=""> Services </a>
        <a href=""> Blog </a>
        <a href=""> Contact </a>
      </nav>

      <p>Company Name © 2018</p>
    </footer>

    <script>
      const toggles = document.getElementsByClassName("icon")[0];
      const header_nav = document.getElementsByClassName("header-nav")[0];
      let isNavVisible = false;

      toggles.addEventListener("click", function () {
        toggles.classList.toggle("close");

        if (isNavVisible) {
          header_nav.classList.remove("header-nav-active"); // Hapus class nav-active
          header_nav.classList.add("header-nav-hidden"); // Tambah class nav-hidden (slide-out)
        } else {
          header_nav.classList.remove("header-nav-hidden"); // Hapus class nav-hidden
          header_nav.classList.add("header-nav-active"); // Tambah class nav-active (slide-in)
        }
        isNavVisible = !isNavVisible; // Balik status nav
      });
    </script>
  </body>
</html>
